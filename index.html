<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>thecirclebracket.com</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="stage">
    <div class="masthead"><p id="bracket-title">thecirclebracket.com</p></div>

    <div class="bracket-wrap">
      <div id="bracket"><!-- SVG injected by render.js --></div>
    </div>

    <footer class="credits" aria-label="Credits">
      <p>Credits</p>
      <ul>
        <li>
          <span>Original graphic</span>
          <a href="https://x.com/EmilioSansolini" target="_blank" rel="noopener noreferrer">
            Emilio Sansolini
          </a>
        </li>
        <li>
          <span>Source code</span>
          <a href="https://github.com/shaohua/the-circle-bracket" target="_blank" rel="noopener noreferrer">
            shaohua/the-circle-bracket
          </a>
        </li>
      </ul>
    </footer>
  </main>
  <div id="team-tooltip" class="team-tooltip" role="tooltip" aria-hidden="true"></div>

  <!-- config first, then renderer. No bundler / no fetch: opens from file:// -->
  <script src="config.js"></script>
  <script src="render.js"></script>
</body>
</html>
