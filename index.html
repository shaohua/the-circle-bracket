<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>World Cup 2026 Bracket | Interactive Knockout Stage</title>
  <meta
    name="description"
    content="Explore an interactive World Cup 2026 bracket with knockout stage matchups, live results, and advancing teams in a circular tournament bracket."
  />
  <meta
    name="keywords"
    content="World Cup 2026 bracket, 2026 World Cup bracket, FIFA World Cup bracket, World Cup knockout bracket, World Cup playoff bracket"
  />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://thecirclebracket.com/" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="thecirclebracket.com" />
  <meta property="og:title" content="World Cup 2026 Bracket | Interactive Knockout Stage" />
  <meta
    property="og:description"
    content="Follow the World Cup 2026 knockout stage with an interactive circular bracket showing matchups, results, and advancing teams."
  />
  <meta property="og:url" content="https://thecirclebracket.com/" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="World Cup 2026 Bracket | Interactive Knockout Stage" />
  <meta
    name="twitter:description"
    content="Follow the World Cup 2026 knockout stage with an interactive circular bracket showing matchups, results, and advancing teams."
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="stage">
    <div class="masthead"><p id="bracket-title">thecirclebracket.com</p></div>

    <div class="bracket-wrap">
      <div id="bracket"><!-- SVG injected by render.js --></div>
    </div>

    <details class="credits">
      <summary class="credits-toggle" title="Credits" aria-label="Show credits">
        <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true" focusable="false">
          <circle cx="12" cy="12" r="9.2" fill="none" stroke="currentColor" stroke-width="1.6" />
          <line x1="12" y1="11" x2="12" y2="16.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          <circle cx="12" cy="7.6" r="1.15" fill="currentColor" />
        </svg>
      </summary>
      <div class="credits-panel" aria-label="Credits">
        <p>Credits</p>
        <ul>
          <li>
            <span>Original graphic</span>
            <a href="https://x.com/EmilioSansolini" target="_blank" rel="noopener noreferrer">
              Emilio Sansolini
            </a>
          </li>
          <li>
            <span>Human author</span>
            <a href="https://x.com/getshao" target="_blank" rel="noopener noreferrer">
              getshao
            </a>
          </li>
          <li>
            <span>Source code</span>
            <a href="https://github.com/shaohua/the-circle-bracket" target="_blank" rel="noopener noreferrer">
              shaohua/the-circle-bracket
            </a>
          </li>
        </ul>
      </div>
    </details>
  </main>
  <div id="team-tooltip" class="team-tooltip" role="tooltip" aria-hidden="true"></div>

  <!-- config first, then renderer. No bundler / no fetch: opens from file:// -->
  <script src="config.js"></script>
  <script src="render.js"></script>
</body>
</html>
